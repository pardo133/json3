<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Fragmentada</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="calc-card">
        <input type="number" id="num1" placeholder="Número A">
        <input type="number" id="num2" placeholder="Número B">
        
        <div class="botones">
            <button id="btn-sumar">Sumar (+)</button>
            <button id="btn-restar">Restar (-)</button>
            <button id="btn-multi">Multiplicar (*)</button>
            <button id="btn-divi">Dividir (/)</button>
        </div>

        <p id="resultado">Esperando operación...</p>
    </div>

    <script src="setup.js"></script> <script src="sumar.js"></script> <script src="restar.js"></script> <script src="multiplicar.js"></script> </body>
    
</html>
